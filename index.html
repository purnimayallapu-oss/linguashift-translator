<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinguaShift — Translator</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="bg-grid"></div>

  <header>
    <div class="logo">
      <span class="logo-icon">⌘</span>
      <span class="logo-text">LinguaShift</span>
    </div>
    <div class="tagline">Real-time language translation</div>
  </header>

  <main>
    <div class="card">

      <!-- Language Bar -->
      <div class="lang-bar">
        <div class="lang-group">
          <label for="sourceLang">From</label>
          <select id="sourceLang">
            <option value="auto">Auto Detect</option>
            <option value="en">English</option>
            <option value="te">Telugu</option>
            <option value="hi">Hindi</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="ru">Russian</option>
            <option value="zh">Chinese (Simplified)</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="ar">Arabic</option>
            <option value="tr">Turkish</option>
            <option value="nl">Dutch</option>
            <option value="pl">Polish</option>
            <option value="sv">Swedish</option>
            <option value="da">Danish</option>
            <option value="fi">Finnish</option>
            <option value="no">Norwegian</option>
            <option value="uk">Ukrainian</option>
            <option value="vi">Vietnamese</option>
            <option value="th">Thai</option>
            <option value="id">Indonesian</option>
            <option value="ms">Malay</option>
          </select>
        </div>

        <button class="swap-btn" id="swapBtn" title="Swap languages">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/>
          </svg>
        </button>

        <div class="lang-group">
          <label for="targetLang">To</label>
          <select id="targetLang">
            <option value="te">Telugu</option>
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="ru">Russian</option>
            <option value="zh">Chinese (Simplified)</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="ar">Arabic</option>
            <option value="tr">Turkish</option>
            <option value="nl">Dutch</option>
            <option value="pl">Polish</option>
            <option value="sv">Swedish</option>
            <option value="da">Danish</option>
            <option value="fi">Finnish</option>
            <option value="no">Norwegian</option>
            <option value="uk">Ukrainian</option>
            <option value="vi">Vietnamese</option>
            <option value="th">Thai</option>
            <option value="id">Indonesian</option>
            <option value="ms">Malay</option>
          </select>
        </div>
      </div>

      <!-- Text Panels -->
      <div class="panels">

        <!-- Source Panel -->
        <div class="panel source-panel">
          <div class="panel-header">
            <span class="panel-label">Source Text</span>
            <span class="char-count" id="charCount">0 / 500</span>
          </div>
          <textarea id="sourceText" placeholder="Enter text to translate..." maxlength="500" spellcheck="true"></textarea>
          <div class="panel-footer">
            <span class="detected-lang" id="detectedLang"></span>
            <button class="icon-btn" id="clearBtn" title="Clear">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
              Clear
            </button>
          </div>
        </div>

        <!-- Divider -->
        <div class="panel-divider">
          <div class="translate-btn-wrap">
            <button class="translate-btn" id="translateBtn">
              <span class="btn-text">Translate</span>
              <span class="spinner" id="spinner"></span>
            </button>
          </div>
        </div>

        <!-- Output Panel -->
        <div class="panel output-panel">
          <div class="panel-header">
            <span class="panel-label">Translation</span>
          </div>
          <textarea id="outputText" placeholder="Translation will appear here..." readonly></textarea>
          <div class="panel-footer output-footer">
            <button class="icon-btn" id="copyBtn" title="Copy translation">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              Copy
            </button>
            <button class="icon-btn" id="ttsBtn" title="Text to speech">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
              Speak
            </button>
          </div>
        </div>

      </div>

      <!-- Error message -->
      <div class="error-bar" id="errorBar"></div>

    </div>
  </main>

  <footer>
    <p>Powered by Google Translate Endpoint · Browser SpeechSynthesis</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
